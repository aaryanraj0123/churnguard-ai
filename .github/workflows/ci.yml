name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install ruff
        run: pip install ruff==0.8.3

      - name: Check lint
        run: ruff check app/

      - name: Check format
        run: ruff format --check app/

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: VITE_API_URL="" npm run build

      - name: Verify dist
        run: test -d dist

  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: churnguard
          POSTGRES_PASSWORD: churnguard
          POSTGRES_DB: churnguard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      PYTHONPATH: ${{ github.workspace }}/backend
      DATABASE_URL: postgresql+asyncpg://churnguard:churnguard@localhost:5432/churnguard_test
      SYNC_DATABASE_URL: postgresql+psycopg2://churnguard:churnguard@localhost:5432/churnguard_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-must-be-at-least-32-characters
      APP_ENV: development
      DEBUG: "true"
      DOCS_URL: /docs
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
      MODEL_PATH: app/ml/artifacts/v1.pkl
      MIN_AUC_THRESHOLD: "0.75"
      PREDICTION_BATCH_SIZE: "500"
      CHUNK_SIZE: "1000"
      UPLOAD_DIR: /tmp/churnguard/uploads
      MAX_UPLOAD_SIZE_MB: "50"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ALGORITHM: HS256
      LOG_LEVEL: INFO

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Create upload directory
        run: mkdir -p /tmp/churnguard/uploads

      - name: Run migrations
        run: alembic upgrade head

      - name: Unit tests
        run: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Integration tests
        run: pytest tests/integration/ -v --cov=app --cov-append --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: churnguard-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: churnguard-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max